<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/head :: head}"></head>

<body>
  <header th:replace="~{fragments/navbar :: navbar}"></header>

  <section class="section">
    <div class="container">
      <h1 class="title" th:text="${page.title}">Stock de ingredientes</h1>
      <p class="subtitle" th:text="${page.description}">Gestión de stock por ingrediente</p>

      <div th:if="${successMessage != null}" class="notification is-success" th:text="${successMessage}"></div>
      <div th:if="${errorMessage != null}" class="notification is-danger" th:text="${errorMessage}"></div>

      <div th:if="${#lists.isEmpty(ingredientes)}">
        <p>No hay ingredientes cargados.</p>
      </div>

      <div th:if="${!#lists.isEmpty(ingredientes)}">
        <form th:action="@{/stock/movimiento}" method="post">
          <table class="table is-fullwidth is-striped is-hoverable">
            <thead>
              <tr>
                <th>Ingrediente</th>
                <th class="has-text-centered">Unidad</th>
                <th class="has-text-centered">Stock actual</th>
                <th class="has-text-centered">Registrar movimiento</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="i : ${ingredientes}">
                <td th:text="${i.name}">Nombre</td>
                <td class="has-text-centered" th:text="${i.unit}">u</td>
                <td class="has-text-centered">
                  <span th:text="${stocks[i.id]}">0</span>
                </td>
                <td>
                  <input type="hidden" name="ingredienteId" th:value="${i.id}" />
                  <div class="columns is-mobile is-vcentered">
                    <div class="column is-4">
                      <div class="select is-small">
                        <select name="tipo">
                          <option th:value="${T(inspt_programacion2_kfc.backend.models.stock.TipoMovimiento).ENTRADA}">
                            Entrada
                          </option>
                          <option th:value="${T(inspt_programacion2_kfc.backend.models.stock.TipoMovimiento).SALIDA}">
                            Salida
                          </option>
                        </select>
                      </div>
                    </div>
                    <div class="column is-3">
                      <input class="input is-small" type="number" name="cantidad" min="0" value="0" />
                    </div>
                    <div class="column is-5">
                      <input class="input is-small" type="text" name="motivo" placeholder="Motivo (opcional)" />
                    </div>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>

          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <div class="field has-text-right">
            <div class="control">
              <button type="submit" class="button is-link">
                Aplicar cambios
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </section>
</body>

</html>
